spring:
  main:
    lazy-initialization: true
  datasource:
    url: jdbc:h2:mem:testdb;MODE=MySQL
    driver-class-name: org.h2.Driver
    username: kkanyo
    password:
    # JPA/Hibernate
  jpa:
